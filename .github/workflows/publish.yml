name: Publish to npm

# Publishes @obviousbread/docs to npm via trusted publishing (OIDC) when a
# vX.Y.Z tag is pushed. No long-lived npm token: the job mints a short-lived
# OIDC credential that npm accepts because this repo + workflow filename are
# registered as a trusted publisher on npmjs.com.
#
# Tests are run locally before tagging (see the release process in AGENTS.md),
# so this workflow only builds the tarball and publishes it.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}   # manual run — used to safely verify trusted publishing (see the verify step)

permissions:
  id-token: write   # required: lets the job mint an OIDC token for npm
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'                         # trusted publishing needs Node >= 22.14.0
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false               # never cache in release builds
      - run: npm install -g npm@latest               # trusted publishing needs npm >= 11.5.1

      # Release path (tag push): publish, but skip if this version is already on
      # npm — keeps the run green for the bootstrap tag and safe to re-run.
      - name: Publish to npm if version is new
        if: github.event_name == 'push'
        run: |
          name=$(node -p "require('./package.json').name")
          version=$(node -p "require('./package.json').version")
          if npm view "$name@$version" version > /dev/null 2>&1; then
            echo "$name@$version already published — skipping."
          else
            npm publish --provenance
          fi

      # Verify path (manual dispatch from main only): attempt to publish the current
      # version, which a SAFETY GATE first proves is already live. npm authenticates
      # the OIDC token before the registry rejects the duplicate version, so reaching
      # that rejection proves trusted publishing is wired correctly. Nothing can go
      # live: the gate aborts unless the version already exists, and published
      # versions are immutable.
      - name: Verify trusted publishing (safe no-op publish)
        if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main'
        run: |
          name=$(node -p "require('./package.json').name")
          version=$(node -p "require('./package.json').version")
          # Safety gate: refuse to run unless this exact version is ALREADY on npm.
          # Without this, dispatching from a branch whose package.json holds an
          # unpublished version would publish it for real.
          if ! npm view "$name@$version" version > /dev/null 2>&1; then
            echo "::error::Refusing to verify: $name@$version is not yet published. Run this only against a version already live on npm."
            exit 1
          fi
          out=$(npm publish --provenance 2>&1) || true
          echo "$out"
          if echo "$out" | grep -qiE "cannot publish over|previously published|already published"; then
            echo "::notice::OIDC trusted publishing WORKS — auth succeeded; registry rejected only the duplicate version."
          else
            echo "::error::OIDC did not authenticate as expected — trusted publisher likely misconfigured."
            exit 1
          fi
